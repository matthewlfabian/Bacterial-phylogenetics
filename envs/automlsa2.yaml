name: automlsa2
channels:
  - defaults
  - conda-forge
  - bioconda
dependencies:
  - python=3.8
  - numpy=1.19
  - blast
  - mafft
  - iqtree
  - pip
  - pip:
    - scipy==1.5.4
    - pandas==1.1.5
    - matplotlib==3.3.4
    - biopython==1.78
    - "--no-deps automlsa2"
    - rich
    - packaging
    - psutil
